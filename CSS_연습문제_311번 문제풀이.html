<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 자율학습</title>

    <style>
        .container {
            width: 500px;
            border: 1px solid #ccc;
            padding: 10px;
            background: rgb(0, 0, 0);
            color: rgb(255, 255, 255)
        }
        h1 {
            font-size: 1.2rem;
        }
        p {
            line-height: 25px;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1></h1>웹 디자인 트렌드를 따라 잡는 비법 대 공개!</h1>
        <p>그래픽 프로그램으로 웹 디자인 요소를 일일이 만들어 웹사이트를 제작하는 시대는 
            지났다. 이제 모바일, 태블릿, pc등 멀티 디바이스에 한 번에 적용할 수 있는 
        웹디자인 방법을 알아야 한다. 바로 <b>코딩을 이용한 웹 디자인</b>이다.</p>
    </div>
</body>
</html>
