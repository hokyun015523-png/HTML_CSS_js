<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원형 그라데이션</title>

    <style>
        div {
            width: 500px;
            height: 300px;
            margin: 10px;
            border: 1px solid #222;
            border-radius: 10px;
        }
        .grad1 { 
            background:  red;
            background:  repeating-linear-gradient(yellow, red 20px);
        }
        .grad2 {
            background: #ccc;
            background: repeating-radial-gradient(circle, white, #ccc);
        }
    </style>

</head>
<body>
    <div class="grad1"></div>
    <div class="grad2"></div>
</body>
</html>
