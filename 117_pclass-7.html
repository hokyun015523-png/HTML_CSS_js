<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 클래스</title>

    <style>
        body {
            background-color: #222;
        }
        nav {
            width: 600px;
            height: 60px;
            margin: 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            font-size: 15px;
            font-weight: 700px;
            color: #fff;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.4rem 0;
            transition: 0.3s;
        }
        nav a:hover {
            color: #ff7a18;
        }
        nav:has(a: ahover) a:not(:hover) {
            opacity:0.3;
        }
    </style>

</head>
<body>
    <nav>
        <a href="#">homw</a>
        <a href="#">about</a>
        <a href="#">portfolio</a>
        <a href="#">contact</a>
    </nav>
</body>
</html>
