<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레드향 주문하기</title>
</head>
<body>
    <h1>래드향 주문하기</h1>

    <form action="">
        <fieldset>
                <legend>배송 정보</legend>
                <!-- 배송 정보 입력하는 폼 만들기: 목록, fpdlqmf. input -->
                 <ul>
                    <li>
                        <label for="us">이름</label>
                        <input type="text" id="user-name">
                    </li>
                    <li>
                        <label for="addr">배송 주소</label>
                        <input type="text" id="addr">
                    </li>
                    <li>
                        <label for="mail">이메일</label>
                        <input type="email" id="mail">
                    </li>
                    <li>
                        <label for="phone">연락처</label>
                        <input type="tel" id=" phone">
                    </li>
                 </ul>
        </fieldset>

        
        <!-- 라디오 버튼과 체크 박스 사용한 폼 -->
          <fieldset>
            <legend>상품 선택</legend>
            <p><b>주문할 상품을 선택해주세요!</b></p>
            <ul>
                <li>
                    <label for="">
                        <input type="checkbox" name="prod" value="s_3">선물용 3kg
                    </label>
                </li>
                <li>
                    <label for="">
                        <input type="checkbox" name="prod" value="s_5">선물용 5kg
                    </label>
                </li>
                <li>
                    <label for="">
                        <input type="checkbox" name="prod" value="f_3">가정용 3kg
                    </label>
                </li>
                <li>
                    <label for="">
                        <label for="">
                        <input type="checkbox" name="prod" value="f_5">가정용 5kg
                    </label>
                    </label>
                </li>
            </ul>

            <p><b>포장 선택</b></p>
            <ul>
                <li>
                    <label for="">
                        <input type="radio" name="gift" value="yes">선물 포장
                    </label>
                </li>
                <li>
                    <label for="">
                        <input type="radio" name="gift" value="no">선물 포장 안 함
                    </label>
                </li>
            </ul>

          </fieldset>
    </form>
    
</body>
</html>
