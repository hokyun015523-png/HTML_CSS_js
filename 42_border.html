<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스테두리</title>

    <style>
        div {
            width: 200px;
            height: 100px;
            margin: 15px;
            text-align: center;
            font-size: 20px;
            line-height: 100px;
            border-width: 5px;
            display: inline-block;
        }
        .box1 {
            border-style: solid;
            border-width: 2px;
            border-color: royalblue;
        }
        .box2 {
            border-style: dotted;
            border-width: thick thin;
            border-top-color: rgb(240, 216, 5);
        }
        .box3 {
            border-style: dashed;
            border-width: 10px 5px 5px 10px;
             border-left-color: rgb(0, 255, 234);
        }
  
    </style>

</head>
<body>
    <div class="box1">실선 테두리</div>
    <div class="box2">점선 테두리</div>
    <div class="box3">짦은 테두리</div>    
</body>
</html>
