<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 개발 퀴즈</title>
    <style>
        /* 표 전체 스타일 설정 */
        table {
            border-collapse: collapse;
            width: 200px;
        }
        td {
            border: 1px solid #777777; 
            padding: 10px;         
            font-family: sans-serif;
        }
        tr:nth-child(2n+1) {
            background-color: #cccccc;
        }
        
    </style>
</head>
<body>
    <h2>웹 개발</h2>
    <table>
        <tr>
            <td>HTML</td>
        </tr>
        <tr>
            <td>CSS</td>
        </tr>
        <tr>
            <td>Javascript</td>
        </tr>
        <tr>
            <td>Node.js</td>
        </tr>
        <tr>
            <td>Typescript</td>
        </tr>
    </table>

</body>
</html>
