<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원형 그라데이션</title>

    <style>
        div {
            width: 500px;
            height: 300px;
            margin: 10px;
        }
        .grad1 {
            background: red;
            background: radial-gradient(white, yellow, red);
        }
        .grad2 {
            background: red;
            background: radial-gradient(circle, white, yellow, rgb(0, 60, 255));
        }
    </style>

</head>
<body>
    <div class="grad1"></div>
    <div class="grad2"></div>
</body>
</html>
