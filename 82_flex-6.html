<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 박스 레이아웃</title>

    <style>
        .container {
            width: 450px;
            height: 150px;
            display: flex;
            align-items: center;
            background-color: #eee;
            border: 1px solid #222;
            margin-bottom: 30px;
        }
        .box {
            width: 80px;
            padding: 5px 45px;
            margin: 5px;
        }
        .box:nth-child(odd) {
            background-color: rgb(238, 255, 0);
        }
        .box:nth-child(even) {
            background-color: rgb(245, 8, 213);
        }
        p {
            text-align: center;
            font-weight: bold;
        }
        #box1 {
            align-self: flex-start;
        }
        #box3 {
            align-self: stretch;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box" id="box1"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box" id="box3"><p>3</p></div>
        <div class="box"><p>4</p></div>
</body>
</html>
