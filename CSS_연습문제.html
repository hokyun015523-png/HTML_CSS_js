<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곰돌이 인형</title>
    
    <style>
        .square-img {
            border: 1px solid #ccc;
        }

        .circle-img {
            border: 1px solid #ccc;
            border-radius: 50%;
            box-shadow: 5px 5px 30px 2px #000;
        }
    </style>

</head>
<body>
    <img src="images/bear.jpg" class="square-img">
    <img src="images/bear.jpg" class="circle-img">
</body>
</html>
