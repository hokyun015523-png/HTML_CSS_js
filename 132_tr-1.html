<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>

    <style>
        .box {
            margin: 50px auto;
            width: 100px;
            height: 100px;
            background-color: rgb(218, 130, 206);
            border: 1px solid #222;
            transition: 2s ease-in;
        }
        .box:hover {
            width: 800px;
            height: 800px;
            background-color: rgb(255, 0, 170);
            transform: rotate(270deg);
        }
    </style>

</head>
<body>
    <div class="box"></div>
</body>
</html>
