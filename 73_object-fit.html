<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 찌그러짐 방지</title>

    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .container {
            width: 200px;
            height: 400px;
            border: ipx solid #000;
        }
        img {
            width: 100%;
            height: 100%;
        }
        .fill {
            object-fit:  fill;
        }
        .contain {
            object-fit: contain;
        }
        .cover {
            object-fit: cover;
        }
        .none {
            object-fit: none;
        }
        .scale-down {
            object-fit: scale-down;
        }
    </style>

</head>
<body>
    <div class="container">
        <img src="images/cat.png" alt="고양이" class="fill">
        <h3>object-filt : fill</h3>  
    </div>
        <div class="container">
        <img src="images/cat.png" alt="고양이" class="contain">
        <h3>object-filt : contain</h3>  
    </div>
        <div class="container">
        <img src="images/cat.png" alt="고양이" class="cover">
        <h3>object-filt : cover</h3>  
    </div>
        <div class="container">
        <img src="images/cat.png" alt="고양이" class="none">
        <h3>object-filt : none</h3>  
    </div>
        <div class="container">
        <img src="images/cat.png" alt="고양이" class="scale-down">
        <h3>object-filt : scale-down</h3>  
    </div>
</body>
</html>
