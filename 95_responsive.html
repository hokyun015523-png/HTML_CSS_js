<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 부모 그리드 컨테이너 설정 */
        .container {
            width: 1000px;
            margin: 10px auto;
            padding: 10px;
            display: grid;
            grid-template-columns: auto;
            grid-template-rows: repeat(3, 250px);  /* 높이 250 */
            gap: 0.5rem;
        }
        .itme {
            border-radius: 5px;
            font-size: 2rem;
        }
        .item-1 {
            background-color: #e91e63;
            grid-column: 1 / 2;
            grid-row: 1 / 3;
        }
        .item-2 {
            background-color: #ff9800;
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }
        .item-3 {
            background-color: #ab47bc;
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }
        .item-4 {
            background-color: #38cf44;
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }
        .item-5 {
            background-color: #546e71;
            grid-column: 1 / 4;
            grid-row: 3 / 4;
        }
        @media (max-width: 768px) {
            .container {
                width: 720px;
                margin: 10px auto;
                display: block;
            }
            .item {
                height: 200px;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 320px) {
            .container {
                width: 300px;
                margin: 10px auto;
                display: block;
            }
            .item {
                height: 100px;
                margin-bottom: 10px;
            }
        }
    </style>

</head>
<body>
    <!-- 오타 수정: contanier -> container -->
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
        <div class="item item-5">5</div>
    </div>
</body>
</html>
