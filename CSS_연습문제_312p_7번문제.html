<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학언론사 수습기자 모집</title>
    <style>
        body {
            background-color: #02233b;
            margin: 0;
            padding: 20px;
            font-family: "맑은 고딕", sans-serif;
        }
        #container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background-color: #ffffff;
            background-image: url('images/mic.png');
            background-repeat: no-repeat;
            background-position: right bottom;
            box-sizing: border-box;
    
        }
        h1 {
            background-color: #004344;
            color: #ffffff;
            text-align: center;
        }
        p {
            text-align: center;
        }
        h2 {
            font-size: 16px;
            color: #cc0000;
            margin-top: 30px;
        }
        ul {
            list-style-type: none;
            padding-left: 0;            
        }
        li {
            font-size: 14px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>대학언론사 수습기자 모집</h1>
        <p><em>신입생 여러분을 기다립니다</em></p>
        <h2>모집분야</h2>
        <ul>
            <li><b>아나운서(0명)</b> : 학내 소식을 라디오 방송으로 보도</li>
            <li><b>프로듀서/엔지니어(0명)</b> : 라디오 방송 기획, 제작</li>
            <li><b>엔지니어(0명)</b> : 라디오 방송 송출 및 편집</li>
        </ul>

        <h2>혜택</h2>
        <ul>
            <li>수습기자 활동 중 소정의 활동비 지급</li>
            <li>정기자로 진급하면 장학금 지급</li>
        </ul>

    </div>

</body>
</html>
