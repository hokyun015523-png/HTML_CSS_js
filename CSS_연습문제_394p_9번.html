<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그리드 줄 번호</title>

    <style>
        .container {
            width: 540px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 100px);
            grid-template-areas: 
            "box1 box2 box2"
            "box1 box3 box4"
            "box5 box3 box4";
            gap: 1rem;
        }
        .box {
            padding: 10px;
            color: #000000;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .box1 {
            background-color: #ebe709;
            grid-area: box1;
        }
        .box2 {
            background-color: #ebe709;
            grid-area: box2;
        }
        .box3 {
            background-color: #ebe709;
            grid-area: box3;
        }
        .box4 {
            background-color: #ebe709;
            grid-area: box4;
        }
        .box5 {
            background-color: #ebe709;
            grid-area: box5;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
    </div>
</body>
</html>
