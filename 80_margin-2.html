<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 박스</title>

    <style>
        .container {
            width: 700px;
            display: flex;
            justify-content: flex-end;
            background-color: #eee;
            border: 1px solid #222;
            margin-bottom: 30px;
        }
        .box {
            padding: 5px 45px;
            margin: 5px;
            width: 80px;
        }
        .box:nth-child(odd) {
            background-color: #4e04fc;
        }
        .box:nth-child(even) {
            background-color: rgb(231, 247, 9);
        }
        p{
            text-align: center;
            font-weight: bold;
        }
        #box3 {
            margin-left: auto;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box" id="box1"><p>1</p></div>
        <div class="box" id="box1"><p>2</p></div>
        <div class="box" id="box1"><p>3</p></div>
    </div> 
</body>
</html>
